name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BIN_NAME: jqpp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git --rev p-0.2.5
      - name: Build
        run: cross build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz ${{ env.BIN_NAME }}
          cd -
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz

  build-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz ${{ env.BIN_NAME }}
          cd -
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz

  publish:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cd -
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"

          HASH_AARCH64_DARWIN=$(grep "jqpp-aarch64-apple-darwin.tar.gz"       artifacts/SHA256SUMS | awk '{print $1}')
          HASH_X86_64_DARWIN=$(grep  "jqpp-x86_64-apple-darwin.tar.gz"        artifacts/SHA256SUMS | awk '{print $1}')
          HASH_AARCH64_LINUX=$(grep  "jqpp-aarch64-unknown-linux-gnu.tar.gz"  artifacts/SHA256SUMS | awk '{print $1}')
          HASH_X86_64_LINUX=$(grep   "jqpp-x86_64-unknown-linux-gnu.tar.gz"   artifacts/SHA256SUMS | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sukkola/homebrew-tap.git" tap
          cd tap

          cat > Formula/jqpp.rb <<FORMULA
          class Jqpp < Formula
            desc "A robust TUI for interactively exploring JSON with jq-like queries"
            homepage "https://github.com/sukkola/jqpp"
            version "${VERSION_NO_V}"

            on_macos do
              on_arm do
                url "https://github.com/sukkola/jqpp/releases/download/${VERSION}/jqpp-aarch64-apple-darwin.tar.gz"
                sha256 "${HASH_AARCH64_DARWIN}"
              end
              on_intel do
                url "https://github.com/sukkola/jqpp/releases/download/${VERSION}/jqpp-x86_64-apple-darwin.tar.gz"
                sha256 "${HASH_X86_64_DARWIN}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/sukkola/jqpp/releases/download/${VERSION}/jqpp-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${HASH_AARCH64_LINUX}"
              end
              on_intel do
                url "https://github.com/sukkola/jqpp/releases/download/${VERSION}/jqpp-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${HASH_X86_64_LINUX}"
              end
            end

            def install
              bin.install "jqpp"
            end

            test do
              system "#{bin}/jqpp", "--version"
            end
          end
          FORMULA

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/jqpp.rb
          git commit -m "jqpp ${VERSION_NO_V}"
          git push
